[package]
name = "zallet-zinder"
version = "0.1.0-alpha.4"
authors = [
    "Jack Grigg <jack@electriccoin.co>",
    "Kris Nuttycombe <kris@electriccoin.co>",
]
edition = "2024"
rust-version = "1.88"
description = "A prototype wallet, using the Zinder chain indexer. Don't rely on this for privacy or with significant funds yet!"
repository = "https://github.com/zcash/zallet"
license = "MIT OR Apache-2.0"
categories = ["cryptography::cryptocurrencies"]
publish = false

[package.metadata.cargo-machete]
# Referenced by the tonic client generated from the vendored Zinder protos.
ignored = ["tonic-prost"]

# This package is its own workspace root so backend-specific transport
# dependencies do not enter the Zebra or Zaino resolution graphs.
[workspace]

[dependencies]
zallet-core = { path = "../../zallet-core" }

futures = "0.3"
hex = "0.4"
i18n-embed = { version = "0.16", features = ["fluent-system", "desktop-requester"] }
incrementalmerkletree = { version = "0.8.2", features = ["legacy-api"] }
orchard = "0.15.0"
prost = "0.14"
prost-types = "0.14"
sapling = { package = "sapling-crypto", version = "0.7" }
serde_json = "1"
tokio = { version = "1", features = ["net", "rt-multi-thread", "time"] }
tonic = "0.14"
tonic-prost = "0.14"
tracing = "0.1"
transparent = { package = "zcash_transparent", version = "0.9.0" }
zcash_client_backend = "0.23"
zcash_primitives = "0.29.0"
zcash_protocol = "0.10.0"

[build-dependencies]
tonic-prost-build = "0.14"

[features]
default = ["spend-index"]

## Per-outpoint transparent spend detection through Zinder's durable index.
spend-index = ["zallet-core/spend-index"]

## Allows `zallet-zinder` to import zcashd wallets.
zcashd-import = ["zallet-core/zcashd-import"]

## `zallet-zinder rpc` CLI support.
rpc-cli = ["zallet-core/rpc-cli"]

## `tokio-console` support.
tokio-console = ["zallet-core/tokio-console"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(tokio_unstable)',
    'cfg(zallet_build, values("merchant_terminal", "wallet"))',
    'cfg(zcash_unstable, values("nu7"))',
] }

[patch.crates-io]
# Keep this block in sync with the root and other backend manifests. Every
# backend opens the same wallet database and must resolve one librustzcash
# family.
equihash = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
f4jumble = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
transparent = { package = "zcash_transparent", git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
zcash_address = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
zcash_client_backend = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
zcash_client_sqlite = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
zcash_encoding = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
# NOTE: zcash_history is deliberately not patched here because the Zinder
# backend graph does not use it.
zcash_keys = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
zcash_primitives = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
zcash_proofs = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }
zcash_protocol = { git = "https://github.com/zcash/librustzcash.git", rev = "d4f4095de03e1aab3bd72b4c3f83459072ed584e" }

age = { git = "https://github.com/str4d/rage.git", rev = "d28f10ee776ce7391f7065695997f998631b113a" }
